<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foundations Baseline</title>
  </head>
  <body>
    <main>
      <h1>Project Management Foundations</h1>
      <form id="login-form">
        <label>
          Email
          <input id="email" type="email" value="admin@example.com" />
        </label>
        <label>
          Password
          <input id="password" type="password" value="password123" />
        </label>
        <button type="submit">Login</button>
      </form>
      <form id="org-form">
        <label>
          Organisation Name
          <input id="org-name" value="Acme Engineering" />
        </label>
        <button type="submit">Create Organisation</button>
      </form>
      <form id="team-form">
        <label>
          Team Name
          <input id="team-name" value="Core Team" />
        </label>
        <label>
          Team Identifier
          <input id="team-identifier" value="CORE" />
        </label>
        <button type="submit">Create Team</button>
      </form>
      <form id="member-form">
        <label>
          Member User ID
          <input id="member-user-id" value="u-2" />
        </label>
        <label>
          Role
          <input id="member-role" value="member" />
        </label>
        <button type="submit">Add Member</button>
      </form>
      <form id="team-settings-form">
        <label>
          New Team Identifier
          <input id="team-settings-identifier" value="CORE2" />
        </label>
        <button type="submit">Update Team Settings</button>
      </form>
      <button id="remove-member">Remove Member</button>
      <form id="project-form">
        <label>
          Project Name
          <input id="project-name" value="Roadmap Alpha" />
        </label>
        <button type="submit">Create Project</button>
      </form>
      <form id="project-search-form">
        <label>
          Project Search
          <input id="project-search" value="Roadmap" />
        </label>
        <label>
          Status Filter
          <input id="project-status-filter" value="planning" />
        </label>
        <button type="submit">List Projects</button>
      </form>
      <button id="load-project-detail">Load Project Detail</button>
      <form id="issue-form">
        <label>
          Issue Title
          <input id="issue-title" value="Fix login bug" />
        </label>
        <button type="submit">Create Issue</button>
      </form>
      <button id="update-issue">Update Issue</button>
      <button id="load-issue-detail">Load Issue Detail</button>
      <form id="label-form">
        <label>
          Label Name
          <input id="label-name" value="frontend" />
        </label>
        <button type="submit">Create Label</button>
      </form>
      <form id="state-form">
        <label>
          State Name
          <input id="state-name" value="In Review" />
        </label>
        <label>
          Semantic Type
          <input id="state-type" value="started" />
        </label>
        <button type="submit">Create Workflow State</button>
      </form>
      <button id="reorder-states">Reorder States</button>
      <button id="update-project">Update Project</button>
      <button id="archive-project">Archive Project</button>
      <button id="refresh">Refresh Session</button>
      <button id="logout">Logout</button>
      <p id="org-context">Current org: (none)</p>
      <pre id="output"></pre>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
