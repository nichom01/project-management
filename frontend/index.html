<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foundations Baseline</title>
  </head>
  <body>
    <main>
      <h1>Project Management Foundations</h1>
      <form id="login-form">
        <label>
          Email
          <input id="email" type="email" value="admin@example.com" />
        </label>
        <label>
          Password
          <input id="password" type="password" value="password123" />
        </label>
        <button type="submit">Login</button>
      </form>
      <form id="org-form">
        <label>
          Organisation Name
          <input id="org-name" value="Acme Engineering" />
        </label>
        <button type="submit">Create Organisation</button>
      </form>
      <form id="team-form">
        <label>
          Team Name
          <input id="team-name" value="Core Team" />
        </label>
        <label>
          Team Identifier
          <input id="team-identifier" value="CORE" />
        </label>
        <button type="submit">Create Team</button>
      </form>
      <form id="member-form">
        <label>
          Member User ID
          <input id="member-user-id" value="u-2" />
        </label>
        <label>
          Role
          <input id="member-role" value="member" />
        </label>
        <button type="submit">Add Member</button>
      </form>
      <button id="remove-member">Remove Member</button>
      <button id="refresh">Refresh Session</button>
      <button id="logout">Logout</button>
      <p id="org-context">Current org: (none)</p>
      <pre id="output"></pre>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
