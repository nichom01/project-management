<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth Baseline</title>
  </head>
  <body>
    <main>
      <h1>Project Management Auth Baseline</h1>
      <form id="login-form">
        <label>
          Email
          <input id="email" type="email" value="admin@example.com" />
        </label>
        <label>
          Password
          <input id="password" type="password" value="password123" />
        </label>
        <button type="submit">Login</button>
      </form>
      <button id="refresh">Refresh Session</button>
      <button id="logout">Logout</button>
      <pre id="output"></pre>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
